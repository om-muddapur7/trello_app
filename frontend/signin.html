<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    
    <style>
        body{
            margin: 0%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .main {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .left {
            flex: 1;
            background: linear-gradient(135deg, #0079bf, #005fa3);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 8px 60px;
        }

        .left h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #222;
        }

        .left p {
            font-size: 18px;
            margin-top: 18px;
            max-width: 420px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f6fafe;
        }

        .container{
            display: flex;
            width: 380px;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 10px 25px rgb(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 16px;
            background-color: white;
            padding: 35px 30px;
            justify-content: center;
        }

        .container:hover {
            transform: translateY(-1px);
        }

        h1{
            color: #333;
            margin-bottom: 12px;
            text-align: center;
        }

        .input-field{
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label{
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input{
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #333;
            font-size: 14px;
            outline: none;
        }

        input:focus{
            border-color: #4dc051;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        button{
            margin-top: 10px;
            padding: 15px;
            cursor: pointer;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            outline: none;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(76, 175, 80, 0.3);
        }

        p{
            color: white;
            font-size: 16px;
            letter-spacing: 0.5;
            font-weight: 600;
            margin: 0%;
        }

    </style>
</head>

<body>

    <div class="main">

        <div class="left">
            <h1>Trello App</h1>
            <p>Organize your tasks, boost productivity, and collaborate seamlessly.</p>
        </div>

        <div class="right">
            <div class="container">
                <h1>Sign In</h1>

                <div class="input-field">
                    <label for="username">Username</label>
                    <input type="text" placeholder="Enter your username" id="username">
                </div>

                <div class="input-field">
                    <label for="password">Password</label>
                    <input type="password" placeholder="Enter your password" id="password">
                </div>

                <button onclick="signin()"><p>Sign in</p></button>
            </div>
        </div>
        
    </div>

    
</body>
</html>
