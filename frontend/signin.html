<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link rel="stylesheet" href="./styles/signin.css">

    <title>Signin</title>

</head>

<body>
    <div class="main">

        <div class="left">
            <h1>Trello App</h1>
            <p>Organize your tasks, boost productivity, and collaborate seamlessly.</p>
        </div>

        <div class="right">
            <div class="container">
                <h1>Sign In</h1>

                <div class="input-field">
                    <label for="username">Username</label>
                    <input type="text" placeholder="Enter your username" id="username">
                </div>

                <div class="input-field">
                    <label for="password">Password</label>
                    <input type="password" placeholder="Enter your password" id="password">
                </div>

                <button onclick="signin()"><p>Sign in</p></button>
            </div>
        </div>
        
    </div>

    <script>

        async function signin(){
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            try{
                const response = await axios.post(`${window.location.origin}/signin`, {username, password});

                const token = response.data.token;
                localStorage.setItem("token", token);

                alert("User Signed in successfully");
                window.location = '/organization';
            }
            catch(error){
                console.log("Signin failed", error);
                alert('Something went wrong. Signin failed');
            }
        }
    </script>
    
</body>
</html>
