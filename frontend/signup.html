<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <link rel="stylesheet" href="./styles/signup.css">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
</head>

<body>

    <div class="main">

        <div class="left">
            <h1>Trello App</h1>
            <p>Organize your tasks, boost productivity, and collaborate seamlessly.</p>
        </div>

        <div class="right">
            <div class="container">
                <h1>Register</h1>

                <div class="input-field">
                    <label for="username">Username</label>
                    <input type="text" placeholder="Enter your username" id="username">
                </div>

                <div class="input-field">
                    <label for="password">Password</label>
                    <input type="password" placeholder="Enter your password" id="password">
                </div>

                <button onclick="signup()"><p>Sign up</p></button>
            </div>
        </div>
        
    </div>


    <script>

        async function signup(){
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            try{
                const response = await axios.post(`${window.location.origin}/signup`, {username, password})
                alert("User registered successfully");
                window.location = '/signin'
            }
            catch(error){
                console.log("Signup failed", error);
                alert('Something went wrong. Signup failed');
            }
        }
    </script>

    
</body>
</html>
